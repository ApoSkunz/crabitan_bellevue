name: Release

on:
  push:
    branches:
      - main
      - alpha

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release

      - name: Build assets for provenance
        run: |
          find public/assets -type f \( -name "*.js" -o -name "*.css" \) \
            -exec sha256sum {} \; > build-checksums.txt
          echo "Build checksums generated"

      - name: Generate SLSA provenance (L2)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'build-checksums.txt'
