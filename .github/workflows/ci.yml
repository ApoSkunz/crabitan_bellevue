name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality-php:
    name: Code Quality — PHP
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHPStan
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress

      - name: PHP_CodeSniffer
        run: vendor/bin/phpcs

  quality-js:
    name: Code Quality — JS/SCSS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  tests:
    name: Tests (TU + TI)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0.40
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: crabitan_bellevue
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run schema on test DB
        run: mysql -h 127.0.0.1 -u root -proot crabitan_bellevue < database/schema.sql

      - name: PHPUnit (TU)
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: crabitan_bellevue
          DB_USER: root
          DB_PASS: root
          XDEBUG_MODE: coverage
        run: |
          mkdir -p coverage
          vendor/bin/phpunit --testsuite Unit --coverage-clover coverage/clover-unit.xml --display-warnings --display-skipped

      - name: PHPUnit (TI)
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: crabitan_bellevue
          DB_USER: root
          DB_PASS: root
          MAIL_HOST: localhost
          MAIL_PORT: '1025'
          MAIL_USER: ''
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit --testsuite Integration --coverage-clover coverage/clover-integration.xml --display-warnings --display-skipped

      - name: Upload PHP coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: php-coverage
          path: coverage/clover-*.xml

  e2e:
    name: E2E + JS Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0.40
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: crabitan_bellevue
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run schema on test DB
        run: mysql -h 127.0.0.1 -u root -proot crabitan_bellevue < database/schema.sql

      - name: Seed mock data for E2E
        run: mysql -h 127.0.0.1 -u root -proot crabitan_bellevue < database/seed_mock_data.sql

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          APP_ENV=test
          APP_URL=http://localhost:8080
          APP_NAME="Crabitan Bellevue"
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NAME=crabitan_bellevue
          DB_USER=root
          DB_PASS=root
          JWT_SECRET=ci-test-secret-key
          JWT_EXPIRY=3600
          MAIL_HOST=localhost
          MAIL_PORT=587
          MAIL_USER=noreply@crabitanbellevue.fr
          MAIL_PASS=unused
          MAIL_FROM_NAME="Crabitan Bellevue"
          CA_API_URL=
          CA_API_KEY=
          EOF

      - name: Build (instrumented for coverage)
        run: VITE_COVERAGE=true npm run build

      - name: Start PHP server
        run: php -S 0.0.0.0:8080 -t public/ public/router.php &

      - name: Wait for server
        run: curl --retry 15 --retry-delay 1 --retry-connrefused --silent --output /dev/null http://localhost:8080/

      - name: Run Playwright (Chromium)
        env:
          APP_URL: http://localhost:8080
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Generate JS coverage (lcov)
        run: |
          if [ -d .nyc_output ] && [ "$(ls -A .nyc_output)" ]; then
            npx nyc report
          else
            echo "No JS coverage data collected — generating empty lcov"
            mkdir -p coverage
            printf 'TN:\nend_of_record\n' > coverage/lcov.info
          fi

      - name: Upload JS coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: js-coverage
          path: coverage/lcov.info

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [tests, e2e]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download PHP coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: php-coverage
          path: coverage/

      - name: Download JS coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: js-coverage
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92 # v2.3.0 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  lighthouse:
    name: Lighthouse — Accessibilité
    if: false   # standby — ESM/Puppeteer conflict en cours d'investigation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0.40
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: crabitan_bellevue
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run schema on test DB
        run: mysql -h 127.0.0.1 -u root -proot crabitan_bellevue < database/schema.sql

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          APP_ENV=test
          APP_URL=http://localhost:8080
          APP_NAME="Crabitan Bellevue"
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NAME=crabitan_bellevue
          DB_USER=root
          DB_PASS=root
          JWT_SECRET=ci-lighthouse-secret
          JWT_EXPIRY=3600
          MAIL_HOST=localhost
          MAIL_PORT=587
          MAIL_USER=noreply@crabitanbellevue.fr
          MAIL_PASS=unused
          MAIL_FROM_NAME="Crabitan Bellevue"
          CA_API_URL=
          CA_API_KEY=
          EOF

      - name: Build assets
        run: npm run build

      - name: Start PHP server
        run: php -S 0.0.0.0:8080 -t public/ public/router.php &

      - name: Wait for server
        run: curl --retry 15 --retry-delay 1 --retry-connrefused --silent --output /dev/null http://localhost:8080/

      - name: Install Chrome
        uses: browser-actions/setup-chrome@facf10a55b9caf92e0cc749b4f82bf8220989148 # v1.7.2
        id: setup-chrome

      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npx lhci autorun

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7

  sca:
    name: SCA — Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Composer audit (PHP deps)
        run: composer audit

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm audit (JS deps)
        # --omit=dev : on audite uniquement les deps de production au niveau high.
        # picomatch est dans semantic-release (devDep) → ne touche pas la prod.
        # Les vulns dev-only sont hors périmètre d'un audit SCA production.
        run: npm audit --audit-level=high --omit=dev
