name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHP_CodeSniffer
        run: vendor/bin/phpcs

  tests:
    name: Tests (TU + TI)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: crabitan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run schema on test DB
        run: mysql -h 127.0.0.1 -u root -proot crabitan_test < database/schema.sql

      - name: PHPUnit (TU)
        run: vendor/bin/phpunit --testsuite Unit

      - name: PHPUnit (TI)
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: crabitan_test
          DB_USER: root
          DB_PASS: root
        run: vendor/bin/phpunit --testsuite Integration
