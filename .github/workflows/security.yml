name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  exakat:
    name: Exakat PHP Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Download Exakat
        run: |
          curl -o exakat.phar https://www.exakat.io/versions/exakat.phar
          php exakat.phar version

      - name: Init project
        run: |
          php exakat.phar init -p project -R .
          echo "=== projects/ après init ===" && find projects/ -type f 2>/dev/null || echo "projects/ introuvable"

      - name: Run analysis
        run: |
          php exakat.phar project -p project
          echo "=== projects/ après analyse ===" && find projects/ -type f 2>/dev/null || echo "projects/ introuvable"

      - name: Generate report
        run: |
          php exakat.phar report -p project -format Text
          echo "=== projects/ après report ===" && find projects/ -type f 2>/dev/null || echo "projects/ introuvable"

      - name: Upload Exakat Report
        uses: actions/upload-artifact@v4
        with:
          name: exakat-report
          path: projects/
          if-no-files-found: warn

  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/php
            p/owasp-top-ten
            p/security-audit

  legitify:
    name: Legitify GitHub Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Legitify
        uses: Legit-Labs/legitify@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target: REPOSITORY
          scorecard: true
