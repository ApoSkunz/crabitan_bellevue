name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  exakat:
    name: Exakat PHP Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # ✅ Utiliser Docker prêt à l'emploi
      - name: Set up Docker
        uses: docker/setup-docker@v4

      - name: Run Exakat
        run: |
          # Créer un projet Exakat
          docker run --rm -v ${{ github.workspace }}:/project exakat/exakat project --bootstrap
          # Lancer l'analyse
          docker run --rm -v ${{ github.workspace }}:/project exakat/exakat project --analyze
          # Générer un rapport HTML
          docker run --rm -v ${{ github.workspace }}:/project exakat/exakat project --report html

      - name: Upload Exakat Report
        uses: actions/upload-artifact@v4
        with:
          name: exakat-report
          path: ./exakat/report/html

  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/php
            p/owasp-top-ten
            p/security-audit

  legitify:
    name: Legitify GitHub Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Legitify
        uses: Legit-Labs/legitify@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target: REPOSITORY
          scorecard: true
