  <line x1="121" y1="140" x2="121" y2="133" stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="121" y1="133" x2="115" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="121" y1="133" x2="127" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <circle cx="115" cy="127" r="1.7" fill="#c9a84c"/>
  <circle cx="127" cy="127" r="1.7" fill="#c9a84c"/>

