  <line x1="37" y1="140" x2="37" y2="133" stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="37" y1="133" x2="31" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="37" y1="133" x2="43" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <circle cx="31" cy="127" r="1.7" fill="#c9a84c"/>
  <circle cx="43" cy="127" r="1.7" fill="#c9a84c"/>

  <!-- Pied 2 — cx=58 -->
  <line x1="58" y1="140" x2="58" y2="133" stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="58" y1="133" x2="52" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="58" y1="133" x2="64" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <circle cx="52" cy="127" r="1.7" fill="#c9a84c"/>
  <circle cx="64" cy="127" r="1.7" fill="#c9a84c"/>

  <!-- Pied 3 — cx=79 -->
  <line x1="79" y1="140" x2="79" y2="133" stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="79" y1="133" x2="73" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="79" y1="133" x2="85" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <circle cx="73" cy="127" r="1.7" fill="#c9a84c"/>
  <circle cx="85" cy="127" r="1.7" fill="#c9a84c"/>

  <!-- Pied 4 — cx=100 -->
  <line x1="100" y1="140" x2="100" y2="133" stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="100" y1="133" x2="94"  y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
