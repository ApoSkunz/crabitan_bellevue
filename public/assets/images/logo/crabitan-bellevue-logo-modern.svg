  <line x1="142" y1="140" x2="142" y2="133" stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="142" y1="133" x2="136" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="142" y1="133" x2="148" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <circle cx="136" cy="127" r="1.7" fill="#c9a84c"/>
  <circle cx="148" cy="127" r="1.7" fill="#c9a84c"/>

  <!-- Pied 7 — cx=163 -->
  <line x1="163" y1="140" x2="163" y2="133" stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="163" y1="133" x2="157" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="163" y1="133" x2="169" y2="127" stroke="#c9a84c" stroke-width="0.85" stroke-linecap="round"/>
  <circle cx="157" cy="127" r="1.7" fill="#c9a84c"/>
  <circle cx="169" cy="127" r="1.7" fill="#c9a84c"/>

  <!-- ── Filet ◆ bas ──────────────────────────────────────────── -->
  <line x1="58" y1="152" x2="87" y2="152" stroke="#c9a84c" stroke-width="0.75"/>
  <polygon points="100,148.5 103.5,152 100,155.5 96.5,152" fill="#c9a84c"/>
  <line x1="113" y1="152" x2="142" y2="152" stroke="#c9a84c" stroke-width="0.75"/>

  <!-- ── "Crabitan" calligraphique ───────────────────────────── -->
  <text
    x="100" y="168"
    font-family="'CAC Champagne', 'Brush Script MT', 'Palace Script MT', cursive"
    font-size="13"
    font-style="italic"
    fill="#c9a84c"
    text-anchor="middle"
    letter-spacing="2">Crabitan</text>

  <!-- ── Séparateur 3 points ──────────────────────────────────── -->
  <circle cx="96"  cy="176" r="1.1" fill="#c9a84c" opacity="0.6"/>
  <circle cx="100" cy="176" r="1.1" fill="#c9a84c" opacity="0.6"/>
  <circle cx="104" cy="176" r="1.1" fill="#c9a84c" opacity="0.6"/>

  <!-- ── "Bellevue" calligraphique ───────────────────────────── -->
  <text
    x="100" y="191"
    font-family="'CAC Champagne', 'Brush Script MT', 'Palace Script MT', cursive"
    font-size="13"
    font-style="italic"
    fill="#c9a84c"
    text-anchor="middle"
    letter-spacing="2">Bellevue</text>
</svg>
