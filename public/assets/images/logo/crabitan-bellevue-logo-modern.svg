    <line x1="60" y1="102" x2="142" y2="102"/>
    <line x1="60" y1="107" x2="142" y2="107"/>
    <line x1="60" y1="112" x2="142" y2="112"/>
    <line x1="60" y1="117" x2="142" y2="117"/>
    <line x1="72"  y1="93" x2="72"  y2="97"/>
    <line x1="84"  y1="93" x2="84"  y2="97"/>
    <line x1="96"  y1="93" x2="96"  y2="97"/>
    <line x1="108" y1="93" x2="108" y2="97"/>
    <line x1="120" y1="93" x2="120" y2="97"/>
    <line x1="132" y1="93" x2="132" y2="97"/>
    <line x1="66"  y1="97" x2="66"  y2="102"/>
    <line x1="78"  y1="97" x2="78"  y2="102"/>
    <line x1="90"  y1="97" x2="90"  y2="102"/>
    <line x1="114" y1="97" x2="114" y2="102"/>
    <line x1="126" y1="97" x2="126" y2="102"/>
    <line x1="138" y1="97" x2="138" y2="102"/>
    <line x1="72"  y1="102" x2="72"  y2="107"/>
    <line x1="84"  y1="102" x2="84"  y2="107"/>
    <line x1="120" y1="102" x2="120" y2="107"/>
    <line x1="132" y1="102" x2="132" y2="107"/>
    <line x1="66"  y1="107" x2="66"  y2="112"/>
    <line x1="78"  y1="107" x2="78"  y2="112"/>
    <line x1="90"  y1="107" x2="90"  y2="112"/>
    <line x1="114" y1="107" x2="114" y2="112"/>
    <line x1="126" y1="107" x2="126" y2="112"/>
    <line x1="138" y1="107" x2="138" y2="112"/>
    <line x1="72"  y1="112" x2="72"  y2="117"/>
    <line x1="84"  y1="112" x2="84"  y2="117"/>
    <line x1="96"  y1="112" x2="96"  y2="117"/>
    <line x1="108" y1="112" x2="108" y2="117"/>
    <line x1="120" y1="112" x2="120" y2="117"/>
    <line x1="132" y1="112" x2="132" y2="117"/>
  </g>

