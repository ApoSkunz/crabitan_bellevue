sonar.organization=aposkunz
sonar.projectKey=ApoSkunz_crabitan_bellevue
sonar.projectName=Crabitan Bellevue

sonar.sources=src,lang,config
sonar.tests=tests
sonar.php.coverage.reportPaths=coverage/clover-unit.xml,coverage/clover-integration.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=\
  vendor/**,\
  node_modules/**,\
  composer.lock,\
  package-lock.json,\
  .env,\
  .env.*,\
  storage/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  database/**

# Faux positifs : les liens dans les templates PHP ont du contenu rendu dynamiquement
# que SonarCloud ne peut pas analyser statiquement
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S6827
sonar.issue.ignore.multicriteria.e1.resourceKey=src/View/**

sonar.coverage.exclusions=\
  tests/**,\
  lang/**,\
  database/**,\
  config/**
