sonar.organization=aposkunz
sonar.projectKey=ApoSkunz_crabitan_bellevue
sonar.projectName=Crabitan Bellevue

sonar.sources=src,lang,config
sonar.tests=tests
sonar.php.coverage.reportPaths=coverage/clover-unit.xml,coverage/clover-integration.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=\
  vendor/**,\
  node_modules/**,\
  composer.lock,\
  package-lock.json,\
  .env,\
  .env.*,\
  storage/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  database/**

# Faux positifs : les liens dans les templates PHP ont du contenu rendu dynamiquement
# que SonarCloud ne peut pas analyser statiquement
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S6827
sonar.issue.ignore.multicriteria.e1.resourceKey=src/View/**
# Overlays/modals gérés avec focus/keyboard JS complet — migration <dialog> différée
sonar.issue.ignore.multicriteria.e2.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e2.resourceKey=src/View/**
# Titre de modal rempli dynamiquement par JS avant ouverture — pas de contenu statique
sonar.issue.ignore.multicriteria.e3.ruleKey=Web:S6850
sonar.issue.ignore.multicriteria.e3.resourceKey=src/View/**

sonar.cpd.exclusions=lang/**,config/**,tests/**

sonar.coverage.exclusions=\
  tests/**,\
  lang/**,\
  database/**,\
  config/**
