sonar.organization=aposkunz
sonar.projectKey=ApoSkunz_crabitan_bellevue
sonar.projectName=Crabitan Bellevue

sonar.sources=src,public/assets,lang,database,config
sonar.tests=tests
sonar.php.coverage.reportPaths=coverage/clover.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=\
  vendor/**,\
  node_modules/**,\
  composer.lock,\
  package-lock.json,\
  .env,\
  .env.*,\
  storage/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**

sonar.coverage.exclusions=\
  tests/**,\
  lang/**,\
  database/**,\
  config/**
